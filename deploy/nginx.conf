server {
    listen 80;
    server_name ytdlp.gifted.co.ke;

    # Large files — video downloads can be several hundred MB
    client_max_body_size 0;
    proxy_read_timeout   3600;
    proxy_send_timeout   3600;
    proxy_connect_timeout 60;

    # Buffering off so files stream directly to client
    proxy_buffering off;
    proxy_request_buffering off;

    location / {
        proxy_pass         http://127.0.0.1:8888;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        # Allow large response bodies (video files)
        proxy_max_temp_file_size 0;
    }

    # Health check bypass (no proxy overhead)
    location /api/health {
        proxy_pass http://127.0.0.1:8888/api/health;
        proxy_set_header Host $host;
        access_log off;
    }

    access_log  /var/log/nginx/ytdlp-api-access.log;
    error_log   /var/log/nginx/ytdlp-api-error.log;
}
